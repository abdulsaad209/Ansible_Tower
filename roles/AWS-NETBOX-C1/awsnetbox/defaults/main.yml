# ============================================
# Additional Instance Sync Settings
# ============================================

# Default memory size (in MiB) if instance type lookup fails
default_instance_memory: 1024

# Default disk size (in MB) if volume info is unavailable
default_instance_disk: 8192

# Whether to sync stopped instances
sync_stopped_instances: true

# Whether to sync terminated instances
sync_terminated_instances: false
