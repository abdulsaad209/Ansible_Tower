# NetBox Configuration
netbox_url: "http://netbox.hub.csiprod.com"
netbox_token: "c9ed68ffbafb0e7251bcc39d00dc4a29614742eb"

# Optional: Create VLANs for subnets
netbox_create_vlans: false

# Account to sync
target_accounts: ["all"]

# Multi-Account Configuration
aws_accounts:
  - name: "VPMA-DEV-EXT-ACCOUNT"
    profile: "vpdev"  # AWS CLI profile name
    netbox_tenant: "VPMA-DEV-EXT-ACCOUNT"
    netbox_tenant_slug: "vpma-dev-ext-account"
    netbox_tags:
      - "VP"
      - "Dev"
    regions:
      - us-east-1

  - name: "VPMA-PROD-EXT-ACCOUNT"
    profile: "vpprod"
    netbox_tenant: "VPMA-PROD-EXT-ACCOUNT"
    netbox_tenant_slug: "vpma-prod-ext-account"
    netbox_tags:
      - "VP"
      - "Prod"
    regions:
      - us-east-1

  - name: "C1US-PROD-EXT-ACCOUNT"
    profile: "c1prod"
    netbox_tenant: "C1US-PROD-EXT-ACCOUNT"
    netbox_tenant_slug: "c1us-prod-ext-account"
    netbox_tags:
      - "C1"
      - "Prod"
    regions:
      - us-west-2


# ============================================
# NetBox Mappings for EC2 Instances
# ============================================

# AWS EC2 Instance State to NetBox VM Status Mapping
netbox_instance_status_map:
  pending: "planned"
  running: "active"
  stopping: "staged"
  stopped: "offline"
  shutting-down: "decommissioning"
  terminated: "decommissioning"



