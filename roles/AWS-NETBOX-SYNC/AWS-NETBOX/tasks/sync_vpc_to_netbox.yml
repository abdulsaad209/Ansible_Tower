---
# ---------------------------------
# Flatten VPC data
# ---------------------------------
- name: flatten vpc info with regions
  set_fact:
    vpc_list: "{{ vpc_list | default([]) + [{'vpc': item.1, 'region': item.0.item}] }}"
  loop: "{{ aws_vpc_info.results | subelements('vpcs') }}"
  loop_control:
    label: "{{ item.1.vpc_id }}"


# ---------------------------------
# Create VRFs in NetBox
# ---------------------------------
- name: sync vpc to netbox as vrf
  netbox.netbox.netbox_vrf:
    netbox_url: "{{ netbox_url }}"
    netbox_token: "{{ netbox_token }}"
    data:
      name: "{{ item.vpc.vpc_id }}"
      description: "{{ item.vpc.tags.Name | default(item.vpc.vpc_id) }}"
      tenant: "{{ current_netbox_tenant }}"
      custom_fields:
        cidr_block: "{{ item.vpc.cidr_block }}"
        region: "{{ item.region }}"
    state: present
  loop: "{{ vpc_list }}"
  loop_control:
    label: "{{ item.vpc.vpc_id }}"
  when: not (item.vpc.is_default | default(false))


# ---------------------------------
# Create Prefixes in NetBox
# ---------------------------------
- name: sync vpc cidr blocks as prefixes
  netbox.netbox.netbox_prefix:
    netbox_url: "{{ netbox_url }}"
    netbox_token: "{{ netbox_token }}"
    data:
      prefix: "{{ item.vpc.cidr_block }}"
      description: "{{ item.vpc.tags.Name | default(item.vpc.vpc_id) }}"
      vrf:
        name: "{{ item.vpc.vpc_id }}"
      tenant: "{{ current_netbox_tenant }}"
      status: active
      custom_fields:
        region: "{{ item.region }}"
    state: present
  loop: "{{ vpc_list }}"
  loop_control:
    label: "{{ item.vpc.vpc_id }} - {{ item.vpc.cidr_block }}"
  when: not (item.vpc.is_default | default(false))


# ---------------------------------
# Cleanup
# ---------------------------------
- name: Clear vpc_list for next account
  set_fact:
    vpc_list: []

