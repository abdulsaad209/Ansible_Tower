# NetBox Configuration
netbox_url: "http://netbox.ms.com"
netbox_token: "o9xGqFFMiho2NeRJTIEmoBv71eO5u5RjISllFrVG"

# Optional: Create VLANs for subnets
netbox_create_vlans: false

# Account to sync
target_accounts: ["all"]

# Task Retry and Delay Interval
task_retries: 5
task_delay: 10

# Multi-Account Configuration
aws_accounts:
  - name: "SZCODERS-CORP-EXT-ACCOUNT"
    profile: "szcoders-corp"  # AWS CLI profile name
    netbox_tenant: "SZCODERS-CORP-EXT-ACCOUNT"
    netbox_tenant_slug: "szcoders-corp-ext-account"
    netbox_tags:
      - "szcoders"
      - "Corp"
      - "AWS"
    regions:
      - us-east-1

  - name: "SZCODERS-PROD-EXT-ACCOUNT"
    profile: "szcoders-prod"
    netbox_tenant: "SZCODERS-PROD-EXT-ACCOUNT"
    netbox_tenant_slug: "szcoders-prod-ext-account"
    netbox_tags:
      - "szcoders"
      - "Prod"
      - "AWS"
    regions:
      - us-east-1

# ============================================
# NetBox Mappings for EC2 Instances
# ============================================

# AWS EC2 Instance State to NetBox VM Status Mapping
netbox_instance_status_map:
  pending: "planned"
  running: "active"
  stopping: "staged"
  stopped: "offline"
  shutting-down: "decommissioning"
  terminated: "decommissionined"

# ============================================
# Additional Instance Sync Settings
# ============================================

# Default memory size (in MiB) if instance type lookup fails
default_instance_memory: 1024

# Default disk size (in MB) if volume info is unavailable
default_instance_disk: 8192

# Whether to sync stopped instances
sync_stopped_instances: true

# Whether to sync terminated instances
sync_terminated_instances: false
