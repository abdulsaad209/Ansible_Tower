---
- name: Create OpenDKIM directory structure
  file:
    path: "{{ item }}"
    state: directory
    owner: opendkim
    group: opendkim
    mode: '0750'
  loop:
    - "{{ dkim_conf_dir }}"
    - "{{ dkim_key_dir }}"

- name: Retrieve DKIM private key from AWS Secrets Manager using AWS CLI
  command: >
    aws secretsmanager get-secret-value
    --secret-id {{ secrets_name }}
    --region {{ aws_region }}
    --query SecretString
    --output text
  register: dkim_secret_cli
  changed_when: false

- name: Write DKIM private key to disk
  copy:
    content: "{{ dkim_secret_cli.stdout }}"
    dest: "{{ dkim_key_dir }}/{{ dkim_selector }}.private"
    owner: opendkim
    group: opendkim
    mode: '0600'

- name: Copy DKIM public key from role files
  copy:
    src: "vp.txt"
    dest: "{{ dkim_key_dir }}/{{ dkim_selector }}.txt"
    owner: opendkim
    group: opendkim
    mode: '0644'

- name: Configure OpenDKIM parameters
  lineinfile:
    path: "{{ dkim_conf_file }}"
    regexp: "^{{ item.key }}\\s*"
    line: "{{ item.key }} {{ item.value }}"
    create: yes
  loop:
    - { key: 'Syslog', value: 'yes' }
    - { key: 'SyslogSuccess', value: 'yes' }
    - { key: 'LogWhy', value: 'yes' }
    - { key: 'UMask', value: '002' }
    - { key: 'Mode', value: 'sv' }
    - { key: 'SendReports', value: 'yes' }
    - { key: 'SoftwareHeader', value: 'yes' }
    - { key: 'MinimumKeyBits', value: '2048' }
    - { key: 'Socket', value: '{{ opendkim_socket }}' }
    - { key: 'PidFile', value: '/run/opendkim/opendkim.pid' }
    - { key: 'OversignHeaders', value: 'From' }
    - { key: 'UserID', value: 'opendkim:opendkim' }
    - { key: 'KeyTable', value: 'refile:{{ dkim_conf_dir }}/KeyTable' }
    - { key: 'SigningTable', value: 'refile:{{ dkim_conf_dir }}/SigningTable' }
    - { key: 'ExternalIgnoreList', value: 'refile:{{ dkim_conf_dir }}/TrustedHosts' }
    - { key: 'InternalHosts', value: 'refile:{{ dkim_conf_dir }}/TrustedHosts' }
    - { key: 'Canonicalization', value: 'relaxed/relaxed' }
    - { key: 'Domain', value: '{{ dkim_primary_domain }}' }

- name: Ensure KeyTable entries exist
  lineinfile:
    path: "{{ dkim_conf_dir }}/KeyTable"
    line: "{{ dkim_selector }}._domainkey.{{ dkim_primary_domain }} {{ dkim_primary_domain }}:{{ dkim_selector }}:{{ dkim_key_dir }}/{{ dkim_selector }}.private"
    create: yes
    state: present

- name: Ensure SigningTable entries exist
  lineinfile:
    path: "{{ dkim_conf_dir }}/SigningTable"
    line: "*@{{ item }} {{ dkim_selector }}._domainkey.{{ dkim_primary_domain }}"
    create: yes
    state: present
  loop: "{{ signing_domains }}"

- name: Ensure TrustedHosts entries exist
  lineinfile:
    path: "{{ dkim_conf_dir }}/TrustedHosts"
    line: "{{ item }}"
    create: yes
    state: present
  loop:
    - "127.0.0.1"
    - "localhost"
    - "::1"
    - "{{ ansible_default_ipv4.address }}"
    - "*.{{ dkim_primary_domain }}"

- name: Add extra TrustedHosts from variable
  lineinfile:
    path: "{{ dkim_conf_dir }}/TrustedHosts"
    line: "{{ item }}"
    create: yes
    state: present
  loop: "{{ trusted_hosts }}"

- name: Ensure OpenDKIM service is enabled and started
  service:
    name: opendkim
    state: started
    enabled: yes

- name: Configure Postfix to use OpenDKIM Milter
  lineinfile:
    path: "{{ main_cf }}"
    regexp: "^{{ item.key }}\\s*="
    line: "{{ item.key }} = {{ item.value }}"
    create: yes
  loop:
    - { key: 'smtpd_milters', value: '{{ opendkim_socket }}' }
    - { key: 'non_smtpd_milters', value: '$smtpd_milters' }
    - { key: 'milter_default_action', value: 'accept' }

- name: Restart OpenDKIM
  service:
    name: opendkim
    state: restarted

- name: Restart Postfix
  service:
    name: postfix
    state: restarted
