# ============================================
# NetBox Mappings for EC2 Instances
# ============================================

# AWS EC2 Instance State to NetBox VM Status Mapping
netbox_instance_status_map:
  pending: "planned"
  running: "active"
  stopping: "staged"
  stopped: "offline"
  shutting-down: "decommissioning"
  terminated: "decommissioning"



