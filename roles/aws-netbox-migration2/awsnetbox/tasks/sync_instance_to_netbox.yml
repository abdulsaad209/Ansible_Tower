---
- name: Initialize instance_list
  set_fact:
    instance_list: []

- name: flatten instance info with regions
  set_fact:
    instance_list: "{{ instance_list + [{'instance': item.1, 'region': item.0.item, 'netbox_tenant': current_netbox_tenant, 'aws_profile': aws_profile}] }}"
  loop: "{{ aws_instance_info.results | subelements('instances') }}"
  loop_control:
    label: "{{ item.1.instance_id }}"
  when:
    - aws_instance_info is defined
    - aws_instance_info.results is defined
    - aws_instance_info.results | length > 0

      #- name: flatten instance info with regions
      #  set_fact:
      #    instance_list: "{{ instance_list | default([]) + [{'instance': item.1, 'region': item.0.item, 'netbox_tenant': current_netbox_tenant, 'aws_profile': aws_profile}] }}"
      #  loop: "{{ aws_instance_info.results | subelements('instances') }}"
      #  loop_control:
      #    label: "{{ item.1.instance_id }}"

- name: Extract unique instance types from discovered instances
  set_fact:
    discovered_instance_types: >-
      {{ instance_list 
         | map(attribute='instance.instance_type') 
         | unique 
         | list }}

- name: Get instance type specifications using AWS CLI
  shell: |
    aws ec2 describe-instance-types \
      --region {{ item }} \
      --instance-types {{ discovered_instance_types | join(' ') }} \
      --query 'InstanceTypes[*].[InstanceType,MemoryInfo.SizeInMiB]' \
      --output json
  loop: "{{ aws_region }}"
  register: instance_type_details_raw
  changed_when: false
  environment:
    AWS_PROFILE: "{{ aws_profile }}"

- name: Parse instance type details
  set_fact:
    instance_type_details: "{{ instance_type_details_raw.results[0].stdout | from_json }}"

- name: Build dynamic memory map from AWS CLI results
  set_fact:
    dynamic_memory_map: >-
      {{ dynamic_memory_map | default({}) | combine({
        item.0: item.1
      }) }}
  loop: "{{ instance_type_details }}"

- name: get volume info for each instance
  amazon.aws.ec2_vol_info:
    region: "{{ item.region }}"
    profile: "{{ item.aws_profile }}"
    filters:
      volume-id: "{{ item.instance.block_device_mappings | map(attribute='ebs.volume_id') | list }}"
  loop: "{{ instance_list }}"
  loop_control:
    label: "{{ item.instance.instance_id }}"
  register: volume_info_results
  when: item.instance.block_device_mappings | length > 0

- name: Ensure NetBox tags exist
  netbox.netbox.netbox_tag:
    netbox_url: "{{ netbox_url }}"
    netbox_token: "{{ netbox_token }}"
    data:
      name: "{{ item }}"
      slug: "{{ item | lower | regex_replace(' ', '-') }}"
    state: present
  loop: "{{ current_netbox_tags }}"
  
- name: sync ec2 instances to netbox as virtual machines
  netbox.netbox.netbox_virtual_machine:
    netbox_url: "{{ netbox_url }}"
    netbox_token: "{{ netbox_token }}"
    data:
      name: "{{ item.0.instance.tags.Name | default(item.0.instance.instance_id) }}"
      status: "{{ netbox_instance_status_map[item.0.instance.state.name] | default('offline') }}"
      site: "{{ dynamic_site_mapping[item.0.region] | default(item.0.netbox_tenant + '-' + item.0.region | upper) }}"
      cluster: "{{ dynamic_cluster_mapping[item.0.instance.placement.availability_zone] | default(item.0.netbox_tenant + '-' + item.0.instance.placement.availability_zone | upper) }}"
      #cluster: "{{ item.0.netbox_tenant }}-{{ item.0.region | upper }}"

      tenant: "{{ item.0.netbox_tenant }}"
      vcpus: "{{ item.0.instance.cpu_options.core_count * item.0.instance.cpu_options.threads_per_core | default(1) }}" 
      memory: "{{ dynamic_memory_map[item.0.instance.instance_type] | default(1024) }}"
      comments: "{{ item.0.instance.tags.Description | default('') }}"
      tags: "{{ current_netbox_tags }}"
      custom_fields:
        instance_id: "{{ item.0.instance.instance_id }}"
        instance_type: "{{ item.0.instance.instance_type }}"
        vpc_id: "{{ item.0.instance.vpc_id | default('') }}"
        subnet_id: "{{ item.0.instance.subnet_id | default('') }}"
        region: "{{ item.0.region }}"
    state: present
  loop: "{{ instance_list | zip(volume_info_results.results) | list }}"
  loop_control:
    label: "{{ item.0.instance.instance_id }}"

- name: flatten instance and volume info for virtual disks
  set_fact:
    instance_volume_list: "{{ instance_volume_list | default([]) + [{'instance': item.0.instance, 'region': item.0.region, 'volume': vol}] }}"
  loop: "{{ instance_list | zip(volume_info_results.results) | list }}"
  loop_control:
    label: "{{ item.0.instance.instance_id }}"
  vars:
    vol: "{{ item.1.volumes }}"
  when: 
    - item.1.volumes is defined
    - item.1.volumes | length > 0

- name: create virtual disks for all attached volumes (including root)
  netbox.netbox.netbox_virtual_disk:
    netbox_url: "{{ netbox_url }}"
    netbox_token: "{{ netbox_token }}"
    data:
      virtual_machine: "{{ item.0.instance.tags.Name | default(item.0.instance.instance_id) }}"
      name: "{{ item.1.attachment_set.0.device }}"
      size: "{{ item.1.size * 1024 }}"
      description: >-
        {{ item.1.type | upper }}
        - {{ item.1.id }}
        {% if item.1.iops is defined and item.1.iops %}
        - {{ item.1.iops }} IOPS
        {% endif %}
    state: present
  with_subelements:
    - "{{ instance_volume_list | default([]) }}"
    - volume
  loop_control:
    label: "{{ item.0.instance.instance_id }} - {{ item.1.id }}"
  when:
    - item.1.attachment_set is defined
    - item.1.attachment_set | length > 0


- name: create primary network interface for instances
  netbox.netbox.netbox_vm_interface:
    netbox_url: "{{ netbox_url }}"
    netbox_token: "{{ netbox_token }}"
    data:
      virtual_machine: "{{ item.instance.tags.Name | default(item.instance.instance_id) }}"
      name: "{{ item.instance.tags.Name | default(item.instance.instance_id) | lower }}"
      enabled: true
      description: "Primary network interface"
    state: present
  loop: "{{ instance_list }}"
  loop_control:
    label: "{{ item.instance.instance_id }}"
  when: 
    - item.instance.network_interfaces is defined
    - item.instance.network_interfaces | length > 0

- name: assign private IP address to instance
  netbox.netbox.netbox_ip_address:
    netbox_url: "{{ netbox_url }}"
    netbox_token: "{{ netbox_token }}"
    data:
      address: "{{ item.instance.private_ip_address }}/32"
      vrf: "{{ item.instance.vpc_id | default(omit) }}"
      status: active
      description: "Private IP for {{ item.instance.tags.Name | default(item.instance.instance_id) }}"
      assigned_object:
        virtual_machine: "{{ item.instance.tags.Name | default(item.instance.instance_id) }}"
        name: "{{ item.instance.tags.Name | default(item.instance.instance_id) | lower }}"
    state: present
  loop: "{{ instance_list }}"
  loop_control:
    label: "{{ item.instance.instance_id }} - {{ item.instance.private_ip_address | default('N/A') }}"
  vars:
    subnet_cidr: "{{ subnet_list | 
                     selectattr('subnet.subnet_id', 'equalto', item.instance.subnet_id) | 
                     map(attribute='subnet.cidr_block') | 
                     first | default('0.0.0.0/0') }}"
  when: 
    - item.instance.private_ip_address is defined

- name: assign public IP address to instance
  netbox.netbox.netbox_ip_address:
    netbox_url: "{{ netbox_url }}"
    netbox_token: "{{ netbox_token }}"
    data:
      address: "{{ item.instance.public_ip_address }}/32"
      status: active
      description: "Public IP for {{ item.instance.tags.Name | default(item.instance.instance_id) }}"
      vrf: "{{ item.instance.vpc_id | default(omit) }}"
      assigned_object:
        virtual_machine: "{{ item.instance.tags.Name | default(item.instance.instance_id) }}"
        name: "{{ item.instance.tags.Name | default(item.instance.instance_id) | lower }}"
      nat_inside:
        address: "{{ item.instance.private_ip_address }}/32"
    state: present
  loop: "{{ instance_list }}"
  loop_control:
    label: "{{ item.instance.instance_id }} - {{ item.instance.public_ip_address | default('N/A') }}"
  when: 
    - item.instance.public_ip_address is defined
    - item.instance.public_ip_address != ""

- name: update virtual machine with primary IP
  netbox.netbox.netbox_virtual_machine:
    netbox_url: "{{ netbox_url }}"
    netbox_token: "{{ netbox_token }}"
    data:
      name: "{{ item.instance.tags.Name | default(item.instance.instance_id) }}"
      primary_ip4: "{{ item.instance.private_ip_address }}/32"
    state: present
  loop: "{{ instance_list }}"
  loop_control:
    label: "{{ item.instance.instance_id }}"
  when: 
    - item.instance.private_ip_address is defined
