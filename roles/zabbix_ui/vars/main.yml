---
monitored_by: 0        # 0 = Zabbix Server, 1 = Zabbix Proxy
zabbix_proxy: false   # Set to true if monitored via Zabbix Proxy
proxy_id: 7

zabbix_url: "https://zabbix.hub.csiprod.com/zabbix"
zabbix_user: "{{ zabbix_user }}"
zabbix_pass: "{{ zabbix_pass }}"

zabbix_server: '10.245.130.89'
zabbix_proxy_ip: '10.99.1.229'

host_name: "{{ ansible_hostname }}"
visible_name: "{{ inventory_hostname }}"
host_ip: "{{ ansible_host }}"

